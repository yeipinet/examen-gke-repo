# ============================================================
#  EXAMEN FINAL — Cloud Computing | Universidad Da Vinci GT
#  Archivo: k8s/frontend/service.yaml
#  Descripcion: Service ClusterIP para el Frontend Nginx
#
#  QUOTA CRITICA: type: ClusterIP — NO usa IPs externas.
#  Acceso via: kubectl port-forward svc/frontend-svc 8081:80
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    app: frontend-app
    tier: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend-app
  ports:
  - name:       http
    protocol:   TCP
    port:        80
    targetPort:  80
