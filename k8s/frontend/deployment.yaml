# ============================================================
#  EXAMEN FINAL — Cloud Computing | Universidad Da Vinci GT
#  Archivo: k8s/frontend/deployment.yaml
#  Descripcion: Deployment del Frontend (Nginx + HTML)
#
#  INSTRUCCION: El script scripts/setup.sh reemplaza
#  automaticamente los placeholders PROJECT_ID y NAMESPACE.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-app
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    app: frontend-app
    tier: frontend
    examen: cloud-computing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-app
  template:
    metadata:
      labels:
        app: frontend-app
        tier: frontend
    spec:
      containers:
      - name: frontend-app
        image: gcr.io/PROJECT_ID_PLACEHOLDER/frontend-app:1.0
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu:    "100m"
            memory: "128Mi"
          limits:
            cpu:    "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds:       15
          failureThreshold:    3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds:       10
          failureThreshold:    3
