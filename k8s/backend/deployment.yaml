# ============================================================
#  EXAMEN FINAL — Cloud Computing | Universidad Da Vinci GT
#  Archivo: k8s/backend/deployment.yaml
#  Descripcion: Deployment del Backend API (Python/Flask)
#
#  INSTRUCCION: El script scripts/setup.sh reemplaza
#  automaticamente los placeholders PROJECT_ID y NAMESPACE.
#  NO edites este archivo manualmente.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    app: backend-api
    tier: backend
    examen: cloud-computing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
        tier: backend
    spec:
      containers:
      - name: backend-api
        image: gcr.io/PROJECT_ID_PLACEHOLDER/backend-api:1.0
        ports:
        - containerPort: 8080

        # ── Resource constraints ──────────────────────────────
        # OBLIGATORIO: No modificar. Dimensionado para e2-small
        # con 6 estudiantes simultaneos sin exceder quota GCP.
        resources:
          requests:
            cpu:    "100m"
            memory: "128Mi"
          limits:
            cpu:    "200m"
            memory: "256Mi"

        # ── Variables de entorno desde ConfigMap y Secret ─────
        env:
        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: app-config
              key:  app_name
        - name: APP_VERSION
          valueFrom:
            configMapKeyRef:
              name: app-config
              key:  app_version
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key:  api_key

        # ── Health checks ─────────────────────────────────────
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds:       20
          failureThreshold:    3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds:       10
          failureThreshold:    3
